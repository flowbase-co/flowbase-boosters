      .label {
        display: flex;
        align-items: center;
        justify-content: center;

        width: 72px;
        height: 34px;
        border-radius: 32px;

        background-color: #000;
        cursor: pointer;

        font-family: system-ui;
        font-size: 14px;
        line-height: 20px;
        text-align: center;
        color: #fff;
      }

      .label-left {
        top: 24px;
        left: 24px;
      }

      [fb-before-after-direction='horizontal'] .label-right {
        top: 24px;
        right: 24px;
      }

      [fb-before-after-direction='vertical'] .label-right {
        left: 24px;
        bottom: 24px;
      }

      .line {
        position: absolute;
        z-index: 1;
        background: #000;
      }

      [fb-before-after-direction='horizontal'] .line {
        top: 0;
        bottom: 0;
        left: var(--thumb-position, 50%);
        transform: translateX(-50%);
        width: 1px;
      }

      [fb-before-after-direction='vertical'] .line {
        top: var(--thumb-position, 50%);
        right: 0;
        left: 0;
        transform: translateY(-50%);
        height: 1px;
      }
